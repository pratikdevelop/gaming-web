<div class="min-h-screen bg-gray-900 text-white flex flex-col items-center">
    <header class="p-6 bg-gray-800 shadow-md w-full text-center">
      <h1 class="text-4xl font-bold text-indigo-400">Lucky Spin</h1>
    </header>
  
    <main class="flex-1 flex flex-col items-center justify-center">
      <div class="flex space-x-4 mb-6">
        <button 
          *ngFor="let amount of [50, 100, 500, 1000]" 
          (click)="setBet(amount)" 
          class="px-4 py-2 bg-indigo-500 text-lg font-bold rounded-lg hover:bg-indigo-600">
          Bet ₹{{ amount }}
        </button>
      </div>
  
      <div class="relative w-72 h-72 bg-indigo-600 rounded-full border-8">
        <div
          id="wheel"
          class="absolute inset-0 rounded-full border-t-4 border-yellow-400"
          [style.transform]="spinStyle">
        </div>
        <button 
          (click)="spinWheel()" 
          class="absolute inset-0 w-16 h-16 bg-yellow-500 text-xl font-bold rounded-full">
          Spin
        </button>
      </div>
  
      <div *ngIf="result" class="mt-6 text-center">
        <h2 class="text-2xl">{{ result }}</h2>
      </div>
    </main>
  </div>
