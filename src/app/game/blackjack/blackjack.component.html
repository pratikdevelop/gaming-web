<div class="min-h-screen bg-gray-900 text-white flex flex-col items-center">
    <header class="w-full p-6 bg-gray-800 shadow-md text-center">
      <h1 class="text-4xl font-bold text-yellow-400">Blackjack</h1>
      <p class="mt-2 text-gray-300">Try to beat the dealer without exceeding 21!</p>
    </header>
  
    <main class="flex-1 flex flex-col items-center justify-center space-y-8">
      <!-- Game Controls -->
      <div *ngIf="!gameStarted" class="text-center">
        <button 
          (click)="startGame()" 
          class="px-6 py-3 bg-indigo-500 text-lg font-bold rounded-lg hover:bg-indigo-600 transition">
          Start Game
        </button>
      </div>
  
      <!-- Game Area -->
      <div *ngIf="gameStarted" class="w-full max-w-4xl space-y-6">
        <!-- Dealer's Cards -->
        <div class="text-center">
          <h2 class="text-2xl font-bold text-red-500">Dealer's Hand</h2>
          <div class="flex justify-center space-x-2 mt-4">
            <div *ngFor="let card of dealerCards" class="w-16 h-24 bg-gray-800 border-2 border-white flex items-center justify-center text-xl font-bold rounded-lg">
              {{ card }}
            </div>
          </div>
          <p class="mt-2 text-gray-300">Score: {{ dealerScore }}</p>
        </div>
  
        <!-- Player's Cards -->
        <div class="text-center">
          <h2 class="text-2xl font-bold text-green-500">Your Hand</h2>
          <div class="flex justify-center space-x-2 mt-4">
            <div *ngFor="let card of playerCards" class="w-16 h-24 bg-gray-800 border-2 border-white flex items-center justify-center text-xl font-bold rounded-lg">
              {{ card }}
            </div>
          </div>
          <p class="mt-2 text-gray-300">Score: {{ playerScore }}</p>
        </div>
  
        <!-- Game Actions -->
        <div class="text-center">
          <button 
            *ngIf="!gameResult" 
            (click)="playerHit()" 
            class="px-6 py-3 bg-yellow-500 text-lg font-bold rounded-lg hover:bg-yellow-600 transition">
            Hit
          </button>
          <button 
            *ngIf="!gameResult" 
            (click)="playerStand()" 
            class="px-6 py-3 bg-indigo-500 text-lg font-bold rounded-lg hover:bg-indigo-600 transition ml-4">
            Stand
          </button>
        </div>
  
        <!-- Game Result -->
        <div *ngIf="gameResult" class="text-center">
          <h2 class="text-3xl font-bold" [ngClass]="{ 'text-green-400': gameResult.includes('win'), 'text-red-400': gameResult.includes('Dealer wins') }">
            {{ gameResult }}
          </h2>
          <button 
            (click)="startGame()" 
            class="mt-4 px-6 py-3 bg-indigo-500 text-lg font-bold rounded-lg hover:bg-indigo-600 transition">
            Play Again
          </button>
        </div>
      </div>
    </main>
  </div>
