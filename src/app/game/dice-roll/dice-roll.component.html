<div class="min-h-screen bg-gray-900 text-white flex flex-col items-center">
    <header class="p-6 bg-gray-800 shadow-md w-full text-center">
      <h1 class="text-4xl font-bold text-yellow-400">Dice Roll</h1>
    </header>
  
    <main class="flex-1 flex flex-col items-center justify-center">
      <div class="flex space-x-4 mb-6">
        <button 
          *ngFor="let amount of [50, 100, 500]" 
          (click)="setBet(amount)" 
          class="px-4 py-2 bg-indigo-500 text-lg font-bold rounded-lg hover:bg-indigo-600">
          Bet ₹{{ amount }}
        </button>
      </div>
  
      <div>
        <button 
          (click)="rollDice()" 
          class="px-6 py-3 bg-yellow-500 text-lg font-bold rounded-lg hover:bg-yellow-600">
          Roll Dice
        </button>
      </div>
  
      <div *ngIf="diceResult !== null" class="mt-6 text-center">
        <h2 class="text-2xl">You rolled: {{ diceResult }}</h2>
      </div>
    </main>
  </div>
